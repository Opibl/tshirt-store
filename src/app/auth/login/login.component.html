<div class="body">
    <!-- LOGIN -->
    <div class="login-container">
        <div class="login-card">
            <h2>Iniciar Sesión</h2>
            <p>Accede a tu cuenta para ver tus compras y pedidos</p>

            <form (ngSubmit)="login()">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        [(ngModel)]="email"
                        placeholder="correo@ejemplo.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        [(ngModel)]="password"
                        placeholder="********"
                        required
                    >
                </div>

                <button type="submit" class="btn-login">
                    Ingresar
                </button>
            </form>

            <button
                type="button"
                class="btn-google"
                (click)="loginConGoogle()">

                <img
                    src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                    alt="Google"
                    class="google-logo"
                >

                Ingresar con Google

            </button>

            <p class="register-link">
                ¿No tienes cuenta?
                <a routerLink="/register">Regístrate aquí</a>
            </p>
        </div>
    </div>

</div>
