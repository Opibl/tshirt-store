<section class="body">
  <link href="https://fonts.googleapis.com/css2?family=Staatliches&display=swap" rel="stylesheet">

  <div class="cuerpo">

    <!-- IMAGEN + OPCIONES -->
    <div class="imagen">
      <img [src]="'/assets/img/' + id + '.jpg'" alt="imagen" class="foto">

      <div class="precio">
        {{ precio }} CLP
      </div>

      <div class="selector-talla">

        <p class="label-talla">TALLA</p>

        <div class="tallas">
          <button
            *ngFor="let talla of tallas"
            type="button"
            class="talla-btn"
            [class.activa]="tallaSeleccionada === talla"
            (click)="tallaSeleccionada = talla">

            {{ talla }}

          </button>
        </div>

        <p class="talla-elegida" *ngIf="tallaSeleccionada">
          Talla seleccionada:
          <strong>{{ tallaSeleccionada }}</strong>
        </p>

        <div class="cantidad">
          <label for="cantidad">Cantidad</label>

          <input
            id="cantidad"
            type="number"
            min="1"
            [(ngModel)]="cantidadSeleccionada">
        </div>

      </div>
    </div>

    <!-- DESCRIPCIÓN -->
    <div class="descripcion">

      <p>{{ descripcion }}</p>

      <div class="contenedor-botones">

        <button
          class="boton agregar-carrito"
          [disabled]="!tallaSeleccionada"
          (click)="addToCart()">

          Agregar al carrito

        </button>

        <button
          class="boton comprar-ahora"
          [disabled]="!tallaSeleccionada"
          (click)="comprarAhora()">

          Comprar ahora

        </button>

      </div>
    </div>
  </div>
</section>
